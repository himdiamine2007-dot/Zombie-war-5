<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Survival: Mobile HUD</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: #111; }

        /* HUD المعلومات العلوية */
        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 100; }
        .stat-box { background: rgba(0,0,0,0.6); color: #fff; padding: 5px 15px; border-radius: 20px; border: 1px solid #f1c40f; font-size: 12px; }

        /* 📱 أزرار التحكم بستايل فري فاير */
        .controls { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        .btn { position: absolute; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; touch-action: none; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(241, 196, 15, 0.4); transform: scale(0.9); }

        /* الجويستيك (يسار) */
        .joystick-area { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px dashed rgba(255,255,255,0.2); }
        .stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; }

        /* أزرار الأفعال (يمين) */
        #fire-btn { bottom: 60px; right: 50px; width: 90px; height: 90px; background: rgba(231, 76, 60, 0.3); border-color: #e74c3c; font-weight: bold; font-size: 18px; }
        #jump-btn { bottom: 160px; right: 60px; width: 55px; height: 55px; font-size: 20px; }
        #crouch-btn { bottom: 60px; right: 160px; width: 55px; height: 55px; font-size: 20px; }
        #run-btn { top: 120px; left: 40px; width: 50px; height: 50px; background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; font-size: 18px; }

        /* شاشة البداية */
        .overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: #f1c40f; }
        input { padding: 12px; border-radius: 25px; border: 2px solid #f1c40f; background: #222; color: #fff; width: 250px; text-align: center; margin: 20px 0; outline: none; }
        .start-btn { padding: 12px 60px; background: #f1c40f; color: #000; border: none; border-radius: 25px; font-weight: bold; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="lobby" class="overlay">
    <h1 style="letter-spacing: 5px;">Z-WAR MOBILE</h1>
    <input type="text" id="p-input" placeholder="اسم المستخدم...">
    <button class="start-btn" onclick="initGame()">دخول المعركة</button>
</div>

<div class="top-bar">
    <div class="stat-box">👤 <span id="h-name">...</span></div>
    <div class="stat-box">💰 <span id="h-cash">0</span></div>
</div>

<div class="controls">
    <div class="btn" id="run-btn">🏃</div>

    <div class="joystick-area">
        <div class="stick" id="stick"></div>
    </div>

    <div class="btn" id="fire-btn">🔥</div>
    <div class="btn" id="jump-btn">🚀</div>
    <div class="btn" id="crouch-btn">⬇️</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let isPlaying = false;
    const player = { x: canvas.width/2, y: canvas.height/2, r: 22, speed: 4, color: '#f1c40f', targetX: canvas.width/2, targetY: canvas.height/2 };
    const enemies = []; const bullets = [];

    // نظام الجويستيك البسيط
    const stick = document.getElementById('stick');
    let moveX = 0, moveY = 0;

    window.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        if (touch.clientX < 200 && touch.clientY > canvas.height - 200) {
            // محاكاة حركة الجويستيك هنا
        }
    });

    // أزرار الأوامر
    document.getElementById('fire-btn').ontouchstart = (e) => { e.preventDefault(); shoot(); };
    document.getElementById('run-btn').ontouchstart = (e) => { e.preventDefault(); player.speed = 8; };
    document.getElementById('run-btn').ontouchend = () => { player.speed = 4; };

    function shoot() {
        bullets.push({ x: player.x, y: player.y, v: 15 });
    }

    function initGame() {
        const name = document.getElementById('p-input').value || "أمين";
        document.getElementById('h-name').innerText = name;
        document.getElementById('lobby').style.display = 'none';
        isPlaying = true;
        spawnEnemy();
        draw();
    }

    function spawnEnemy() {
        if(!isPlaying) return;
        enemies.push({ x: Math.random()*canvas.width, y: -50, r: 20, hp: 3 });
        setTimeout(spawnEnemy, 2000);
    }

    function draw() {
        if(!isPlaying) return;
        ctx.fillStyle = "rgba(17, 17, 17, 0.4)"; // تأثير الـ Trail
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // تحريك اللاعب (محاكاة انسيابية)
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = player.color; ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

        bullets.forEach((b, i) => {
            b.y -= b.v;
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(b.x-2, b.y, 4, 15);
            if(b.y < 0) bullets.splice(i, 1);
        });

        enemies.forEach((e, i) => {
            e.y += 2;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = "#e74c3c"; ctx.fill();
            
            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x - e.x, b.y - e.y) < e.r) {
                    enemies.splice(i, 1); bullets.splice(bi, 1);
                }
            });
        });

        requestAnimationFrame(draw);
    }
</script>
</body>
</html>


<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Invasion 2026 - AI Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; filter: drop-shadow(0 0 5px #00d4ff); }
        #ui { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 16px; z-index: 10; pointer-events: none; text-shadow: 0 0 10px #00d4ff; }
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .btn { width: 75px; height: 75px; background: rgba(0, 212, 255, 0.1); border: 2px solid #00d4ff; border-radius: 50%; font-size: 30px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #fire-btn { background: rgba(255, 0, 0, 0.2); border-color: #ff4444; box-shadow: 0 0 15px #f00; }
        #reload-box { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); width: 60%; height: 6px; background: #111; border-radius: 10px; display: none; overflow: hidden; }
        #reload-fill { width: 0%; height: 100%; background: #f00; box-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

<div id="ui">
    <div>🏆 SCORE: <span id="score">0</span></div>
    <div>💎: <span id="coins">0</span></div>
    <div>❤️: <span id="hp">100</span>%</div>
</div>
<div id="reload-box"><div id="reload-fill"></div></div>

<div class="controls">
    <div style="display:flex; gap:15px;">
        <div class="btn" id="l">⬅️</div>
        <div class="btn" id="r">➡️</div>
    </div>
    <div class="btn" id="fire-btn">💥</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let score = 0, coins = 0, hp = 100, ammo = 10, reloading = false;
    let px = canvas.width/2-30, enemies = [], items = [], pBullets = [], particles = [], dices = [];
    let ml = false, mr = false;

    // التحكم
    document.getElementById('l').ontouchstart = (e) => { e.preventDefault(); ml = true; };
    document.getElementById('l').ontouchend = () => ml = false;
    document.getElementById('r').ontouchstart = (e) => { e.preventDefault(); mr = true; };
    document.getElementById('r').ontouchend = () => mr = false;
    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        if(ammo > 0 && !reloading) {
            pBullets.push({x: px + 25, y: canvas.height - 120});
            ammo--; if(ammo === 0) startReload();
        }
    };

    function startReload() {
        reloading = true; document.getElementById('reload-box').style.display = 'block';
        let w = 0;
        let inv = setInterval(() => {
            w += 0.16; document.getElementById('reload-fill').style.width = w + '%';
            if(w >= 100) { clearInterval(inv); ammo = 10; reloading = false; document.getElementById('reload-box').style.display = 'none'; }
        }, 100);
    }

    function explode(x, y, color) {
        for(let i=0; i<8; i++) particles.push({x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: color});
    }

    function loop() {
        if(hp <= 0) return;
        ctx.fillStyle = 'rgba(2, 2, 10, 0.4)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        if(ml && px > 0) px -= 9; if(mr && px < canvas.width - 60) px += 9;
        ctx.font = '50px Arial'; ctx.fillText('🚀', px, canvas.height - 100);

        // الليزر
        pBullets.forEach((pb, pbi) => {
            pb.y -= 15;
            ctx.fillStyle = '#00d4ff'; ctx.fillRect(pb.x, pb.y, 4, 20);
            enemies.forEach((en, ei) => {
                if(Math.abs(pb.x - en.x) < 50 && Math.abs(pb.y - en.y) < 50) {
                    explode(en.x, en.y, '#ff4444');
                    enemies.splice(ei, 1); pBullets.splice(pbi, 1);
                    score += 15; document.getElementById('score').innerText = score;
                    if(Math.random() > 0.85) dices.push({x: en.x, y: en.y});
                }
            });
            if(pb.y < 0) pBullets.splice(pbi, 1);
        });

        // الوحوش مع حركة جانبية
        enemies.forEach((en, i) => {
            en.y += en.s; 
            // الحركة الجانبية (Sinuous Motion)
            if(en.zigzag) {
                en.x += Math.sin(en.y / 30) * 5;
            }
            ctx.fillText(en.char, en.x, en.y);

            if(en.y > canvas.height - 130 && Math.abs(en.x - px) < 50) {
                hp -= 20; explode(px, canvas.height-100, '#fff');
                enemies.splice(i, 1); document.getElementById('hp').innerText = hp;
                if(hp <= 0) { alert("Game Over! Score: " + score); location.reload(); }
            }
            if(en.y > canvas.height) enemies.splice(i, 1);
        });

        // الانفجارات
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            ctx.fillStyle = p.c; ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, 3, 3);
            if(p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // الأشياء (النرد والماس)
        dices.forEach((d, i) => { d.y += 4; ctx.fillText('🎲', d.x, d.y); if(Math.abs(d.x - px) < 50 && d.y > canvas.height - 150) { hp = Math.min(100, hp+15); document.getElementById('hp').innerText = hp; dices.splice(i,1); } });
        items.forEach((it, i) => { it.y += 4; ctx.fillText('💎', it.x, it.y); if(Math.abs(it.x - px) < 50 && it.y > canvas.height - 150) { coins += 1; document.getElementById('coins').innerText = coins; items.splice(i,1); } });

        requestAnimationFrame(loop);
    }

    setInterval(() => {
        let r = Math.random();
        if(r > 0.4) {
            enemies.push({
                x: Math.random()*(canvas.width-100)+50, 
                y: -50, 
                s: 2+Math.random()*4, 
                char: r>0.7?'👽':'🤖',
                zigzag: Math.random() > 0.5 // 50% من الوحوش كيمشيوا بشكل جانبي
            });
        } else {
            items.push({x: Math.random()*(canvas.width-50), y: -50});
        }
    }, 850);

    loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Survival: Tactical Mobile</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: #0a0a0a; }
        
        /* HUD المعلومات */
        .stats { position: fixed; top: 10px; left: 10px; color: #0f0; font-family: monospace; z-index: 1500; pointer-events: none; font-size: 14px; }

        /* واجهة الدخول */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: white; }
        #p-name { padding: 12px; border-radius: 8px; border: 2px solid #ff4444; margin-bottom: 15px; text-align: center; width: 250px; background: #111; color: white; }
        .btn-ui { padding: 15px 40px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 🎮 التحكم الاحترافي (أزرار صغيرة) */
        .controls { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1000; }
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; user-select: none; touch-action: none; font-size: 14px; }
        
        /* التوزيع */
        .d-pad { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; }
        #run-btn { position: absolute; bottom: 180px; left: 65px; background: rgba(0,255,0,0.2); }
        .action-group { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        #fire-btn { width: 90px; height: 90px; background: rgba(255,0,0,0.3); border: 2px solid #ff4444; font-weight: bold; font-size: 18px; }
        .extra-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="stats">
    NAME: <span id="s-name">-</span> | LVL: <span id="s-lvl">1</span> | CASH: $<span id="s-cash">0</span>
</div>

<div id="lobby" class="overlay">
    <h1 style="color:#ff4444">Z-SURVIVAL MOD</h1>
    <input type="text" id="p-input" placeholder="اكتب اسمك...">
    <button class="btn-ui" id="start-btn">بدء أنماط اللعب</button>
</div>

<div class="controls">
    <div class="btn" id="run-btn">RUN</div>
    <div class="d-pad">
        <div></div><div class="btn" id="u">↑</div><div></div>
        <div class="btn" id="l">←</div><div></div><div class="btn" id="r">→</div>
        <div></div><div class="btn" id="d">↓</div><div></div>
    </div>
    <div class="action-group">
        <div class="btn" id="fire-btn">FIRE</div>
        <div class="extra-btns">
            <div class="btn" id="prone">PRONE</div> <div class="btn" id="crouch">SIT</div> </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let playing = false; let cash = 0; let lvl = 1; let pName = "";
    const player = { x: canvas.width/2, y: canvas.height/2, s: 30, speed: 5, normalSpeed: 5 };
    const bullets = []; const enemies = []; const keys = {};

    // نظام الأزرار
    const bind = (id, k) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
        el.ontouchend = () => keys[k] = false;
    };
    bind('u','u'); bind('d','d'); bind('l','l'); bind('r','r');

    // الجري
    document.getElementById('run-btn').ontouchstart = (e) => { e.preventDefault(); player.speed = 9; };
    document.getElementById('run-btn').ontouchend = () => player.speed = player.normalSpeed;

    // الجلوس والانبطاح
    document.getElementById('crouch').ontouchstart = (e) => { e.preventDefault(); player.s = 15; };
    document.getElementById('crouch').ontouchend = () => player.s = 30;
    document.getElementById('prone').ontouchstart = (e) => { e.preventDefault(); player.s = 10; };
    document.getElementById('prone').ontouchend = () => player.s = 30;

    // إطلاق النار
    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        bullets.push({ x: player.x, y: player.y, v: 8 });
    };

    document.getElementById('start-btn').onclick = () => {
        pName = document.getElementById('p-input').value || "Soldier";
        document.getElementById('s-name').innerText = pName;
        document.getElementById('lobby').style.display = 'none';
        playing = true; spawn(); render();
    };

    function spawn() {
        if(!playing) return;
        let isBoss = (lvl % 3 === 0 && enemies.filter(e=>e.b).length === 0);
        enemies.push({
            x: Math.random()*canvas.width, y: -50,
            b: isBoss, hp: isBoss ? 15*lvl : 2*lvl,
            s: isBoss ? 90 : 30
        });
        setTimeout(spawn, 2000/lvl);
    }

    function render() {
        if(!playing) return;
        ctx.clearRect(0,0,canvas.width, canvas.height);

        if(keys.u) player.y -= player.speed; if(keys.d) player.y += player.speed;
        if(keys.l) player.x -= player.speed; if(keys.r) player.x += player.speed;

        ctx.fillStyle = '#0f0'; ctx.fillRect(player.x-15, player.y-15, player.s, player.s);
        ctx.fillStyle = '#fff'; ctx.fillText(pName, player.x-15, player.y-20);

        bullets.forEach((b, i) => {
            b.y -= b.v; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 4, 10);
            if(b.y < 0) bullets.splice(i, 1);
        });

        enemies.forEach((e, i) => {
            e.y += e.b ? 0.5 : 1.5;
            ctx.fillStyle = e.b ? 'purple' : 'red';
            ctx.fillRect(e.x, e.y, e.s, e.s);

            bullets.forEach((b, bi) => {
                if(b.x > e.x && b.x < e.x+e.s && b.y > e.y && b.y < e.y+e.s) {
                    e.hp--; bullets.splice(bi,1);
                    if(e.hp<=0) {
                        cash += e.b ? 100 : 10;
                        if(e.b) { lvl++; document.getElementById('s-lvl').innerText = lvl; }
                        enemies.splice(i,1);
                        document.getElementById('s-cash').innerText = cash;
                    }
                }
            });
        });
        requestAnimationFrame(render);
    }
</script>
</body>
</html>

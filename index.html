<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغامرة النحلة الخارقة</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* واجهة المعلومات العلوي */
        #top-bar { 
            position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around;
            font-size: 24px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); pointer-events: none;
        }
        .stat-item { background: rgba(255, 255, 255, 0.2); padding: 5px 15px; border-radius: 20px; backdrop-filter: blur(5px); }

        /* أزرار التحكم العملاقة */
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .btn { 
            width: 90px; height: 90px; background: rgba(255, 255, 255, 0.4); 
            border: 4px solid #fff; border-radius: 50%; font-size: 45px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); touch-action: none;
        }
        .btn:active { transform: scale(0.9); background: #FFD700; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="stat-item">🌸 <span id="score">0</span></div>
    <div class="stat-item">⭐ المستوى: <span id="level">1</span></div>
</div>

<div class="controls">
    <div class="btn" id="l">⬅️</div>
    <div class="btn" id="r">➡️</div>
</div>

<canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let score = 0, level = 1, gameActive = true;
    let player = { x: canvas.width / 2 - 30, y: canvas.height - 130, w: 60 };
    let items = [], clouds = [];
    let moveLeft = false, moveRight = false;

    // توليد السحاب للخلفية
    for(let i=0; i<5; i++) clouds.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height/2, s: 0.5+Math.random()});

    // التحكم
    document.getElementById('l').ontouchstart = (e) => { e.preventDefault(); moveLeft = true; };
    document.getElementById('l').ontouchend = () => moveLeft = false;
    document.getElementById('r').ontouchstart = (e) => { e.preventDefault(); moveRight = true; };
    document.getElementById('r').ontouchend = () => moveRight = false;

    function createItem() {
        if(!gameActive) return;
        const rand = Math.random();
        let type = { char: '🌸', bad: false, pts: 10 }; // وردة عادية
        if(rand > 0.8) type = { char: '💎', bad: false, pts: 50 }; // جوهرة نادرة
        if(rand < 0.2) type = { char: '👾', bad: true, pts: 0 }; // وحش صغير (بدل قنبلة)

        items.push({ x: Math.random()*(canvas.width-50), y: -50, s: 3 + (level*0.5), ...type });
        setTimeout(createItem, 1000 - (level*50));
    }

    function update() {
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,canvas.width, canvas.height); // السماء
        
        // رسم وتحريك السحاب
        ctx.font = '60px Arial';
        clouds.forEach(c => {
            ctx.fillText('☁️', c.x, c.y);
            c.x += c.s; if(c.x > canvas.width) c.x = -100;
        });

        // تحريك اللاعب
        if(moveLeft && player.x > 0) player.x -= 8;
        if(moveRight && player.x < canvas.width - player.w) player.x += 8;
        
        ctx.font = '65px Arial';
        ctx.fillText('🐝', player.x, player.y); // النحلة

        items.forEach((it, i) => {
            it.y += it.s;
            ctx.font = '45px Arial';
            ctx.fillText(it.char, it.x, it.y);

            // تصادم (Logic)
            if(it.y > player.y - 40 && it.y < player.y + 20 && Math.abs(it.x - player.x) < 50) {
                if(it.bad) {
                    gameActive = false;
                    alert("يا بطل! الوحش لمسك 🙈\nنقاطك: " + score);
                    location.reload();
                } else {
                    score += it.pts;
                    document.getElementById('score').innerText = score;
                    if(score > level * 200) { level++; document.getElementById('level').innerText = level; }
                    items.splice(i, 1);
                }
            }
            if(it.y > canvas.height) items.splice(i, 1);
        });

        if(gameActive) requestAnimationFrame(update);
    }

    createItem();
    update();
</script>
</body>
</html>

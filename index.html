<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Strike: Global Survival V4</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b0e11; font-family: 'Arial', sans-serif; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; background: radial-gradient(circle, #1b2838 0%, #050505 100%); }
        
        /* CS:GO HUD */
        .hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: none; }
        .crosshair:before { content: ''; position: absolute; left: 9px; width: 2px; height: 20px; background: #0f0; }
        .crosshair:after { content: ''; position: absolute; top: 9px; width: 20px; height: 2px; background: #0f0; }

        .stat-box { position: absolute; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 5px; border-left: 4px solid #f1c40f; font-weight: bold; }
        #top-info { top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; border: none; background: none; }
        
        /* الأزرار */
        .controls { position: fixed; inset: 0; pointer-events: none; }
        .btn { position: absolute; pointer-events: auto; touch-action: none; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #fire { bottom: 40px; right: 40px; width: 95px; height: 95px; background: rgba(231, 76, 60, 0.3); border: 2px solid #e74c3c; font-weight: bold; }
        #shop-btn { top: 10px; right: 10px; width: 100px; height: 45px; border-radius: 5px; background: #f1c40f; color: #000; font-weight: bold; }

        /* الجويستيك */
        #joy { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid #444; }
        #stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: #666; border-radius: 50%; }

        /* قائمة المتجر */
        #shop-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border: 2px solid #f1c40f; display: none; z-index: 100; pointer-events: auto; text-align: center; border-radius: 10px; }
        .shop-item { width: 100%; margin: 10px 0; padding: 12px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; font-weight: bold; }
        .shop-item:active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>

<div id="lobby" style="position:fixed; inset:0; background:#0b0e11; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:#f1c40f; letter-spacing:8px; font-size:40px;">Z-STRIKE</h1>
    <p>LEVELS: 4 | BOSS: EVERY 2 MIN</p>
    <button style="padding:15px 60px; background:#f1c40f; border:none; font-weight:bold; cursor:pointer; border-radius:30px;" onclick="start()">START OPERATION</button>
</div>

<div class="hud">
    <div class="crosshair"></div>
    <div id="top-info">
        <div class="stat-box">💰 $<span id="cash">0</span></div>
        <div class="stat-box" style="color:#ff4444; border-left-color:#ff4444;">BOSS IN: <span id="timer">02:00</span></div>
        <div class="stat-box">🏆 LVL: <span id="lvl">1/4</span></div>
    </div>
    <button id="shop-btn" class="btn" onclick="toggleShop()">SHOP (B)</button>
</div>

<div id="shop-menu">
    <h2 style="color:#f1c40f">BLACK MARKET</h2>
    <button class="shop-item" onclick="buy(1000, 'AK47')">AK-47 [$1000]</button>
    <button class="shop-item" onclick="buy(5000, 'M249')">M249 MACHINEGUN [$5000]</button>
    <button class="shop-item" style="background:#e74c3c;" onclick="toggleShop()">BACK</button>
</div>

<div class="controls">
    <div id="joy"><div id="stick"></div></div>
    <div id="fire" class="btn">FIRE</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let playing = false; let cash = 0; let level = 1; let weapon = "Pistol"; let time = 120;
    const player = { x: canvas.width/2, y: canvas.height/2, r: 18, speed: 4.5 };
    const enemies = []; const bullets = [];

    let mx = 0, my = 0;
    const joy = document.getElementById('joy'), stick = document.getElementById('stick');

    joy.addEventListener('touchmove', e => {
        e.preventDefault(); const t = e.touches[0]; const r = joy.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
        const dist = Math.min(Math.hypot(dx, dy), 40), ang = Math.atan2(dy, dx);
        mx = (Math.cos(ang) * dist) / 40; my = (Math.sin(ang) * dist) / 40;
        stick.style.left = `calc(50% + ${Math.cos(ang)*dist}px)`; stick.style.top = `calc(50% + ${Math.sin(ang)*dist}px)`;
    });

    joy.addEventListener('touchend', () => { mx=0; my=0; stick.style.left='50%'; stick.style.top='50%'; });
    document.getElementById('fire').ontouchstart = (e) => { e.preventDefault(); shoot(); };

    function shoot() {
        let bCount = weapon === "M249" ? 3 : 1;
        for(let i=0; i<bCount; i++) { bullets.push({x: player.x, y: player.y, dmg: (weapon==="AK47"?3:1)}); }
    }

    function toggleShop() { let s = document.getElementById('shop-menu'); s.style.display = s.style.display==='block'?'none':'block'; }
    function buy(cost, w) { if(cash>=cost){ cash-=cost; weapon=w; document.getElementById('cash').innerText=cash; toggleShop(); } }

    function start() { document.getElementById('lobby').style.display='none'; playing=true; spawn(); timer(); loop(); }

    function timer() {
        if(!playing) return;
        if(time > 0) {
            time--; document.getElementById('timer').innerText = `0${Math.floor(time/60)}:${time%60<10?'0'+time%60:time%60}`;
            setTimeout(timer, 1000);
        } else { spawnBoss(); }
    }

    function spawnBoss() {
        enemies.push({x: canvas.width/2, y: -80, r: 70, hp: 100*level, type: 'BOSS', c: '#9b59b6'});
        time = 120; if(level<4) { level++; document.getElementById('lvl').innerText = level+"/4"; }
    }

    function spawn() {
        if(!playing) return;
        let types = [
            {r:18, hp:2, c:'#e74c3c', s:1.5+level*0.2}, // Normal
            {r:14, hp:1, c:'#f39c12', s:3.2+level*0.3}, // Fast
            {r:25, hp:6, c:'#2ecc71', s:1+level*0.1}    // Tank
        ];
        enemies.push({x: Math.random()*canvas.width, y: -30, ...types[Math.floor(Math.random()*types.length)]});
        setTimeout(spawn, 2000/level);
    }

    function loop() {
        if(!playing) return;
        ctx.fillStyle = "rgba(11, 14, 17, 0.4)"; ctx.fillRect(0,0,canvas.width, canvas.height);
        player.x += mx * player.speed; player.y += my * player.speed;

        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = "#4a6a8a"; ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();

        bullets.forEach((b, i) => {
            b.y -= 15; ctx.fillStyle = weapon==="Pistol"?"#fff":"#f1c40f";
            ctx.fillRect(b.x-1, b.y, 2, 15); if(b.y<0) bullets.splice(i,1);
        });

        enemies.forEach((e, i) => {
            e.y += e.s || 1.8;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = e.c; ctx.fill();
            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x-e.x, b.y-e.y) < e.r) {
                    e.hp -= b.dmg; bullets.splice(bi,1);
                    if(e.hp<=0) { cash+=e.type==='BOSS'?1000:50; document.getElementById('cash').innerText=cash; enemies.splice(i,1); }
                }
            });
            if(Math.hypot(player.x-e.x, player.y-e.y) < player.r+e.r) { location.reload(); }
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>


     <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS:GO Global Survival</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #000; }
        
        /* CS:GO Crosshair الاحترافي */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; pointer-events: none; z-index: 100; }
        #crosshair:before { content: ''; position: absolute; left: 14px; width: 2px; height: 30px; background: #0f0; box-shadow: 0 0 8px #0f0; }
        #crosshair:after { content: ''; position: absolute; top: 14px; width: 30px; height: 2px; background: #0f0; box-shadow: 0 0 8px #0f0; }

        /* HUD - واجهة المعلومات */
        .hud { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; color: #f1c40f; pointer-events: none; z-index: 200; }
        .stat-box { background: rgba(0,0,0,0.8); padding: 10px 20px; border-left: 5px solid #f1c40f; font-size: 22px; }

        /* السلاح (M4A1) - منظور الشخص الأول */
        #weapon { position: fixed; bottom: -50px; right: 10%; width: 400px; pointer-events: none; z-index: 150; transition: 0.1s; }

        /* التحكم */
        .controls { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
        #fire-btn { position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 4px solid #f1c40f; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border: 2px solid #444; border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: #333; border-radius: 50%; border: 2px solid #666; }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div class="hud">
    <div class="stat-box">✚ 100</div>
    <div class="stat-box">💰 $<span id="cash">0</span></div>
</div>

<img id="weapon" src="https://www.freeiconspng.com/uploads/csgo-m4a1-s-png-3.png" alt="Gun">

<div class="controls">
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="fire-btn">FIRE</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let cash = 0; let enemies = [];
    let mx = 0, my = 0;

    const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');
    const weaponImg = document.getElementById('weapon');

    jBase.addEventListener('touchmove', e => {
        e.preventDefault(); const t = e.touches[0]; const r = jBase.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
        const d = Math.min(Math.hypot(dx, dy), 50), a = Math.atan2(dy, dx);
        mx = (Math.cos(a)*d)/50; my = (Math.sin(a)*d)/50;
        jStick.style.left = `calc(50% + ${Math.cos(a)*d}px)`; jStick.style.top = `calc(50% + ${Math.sin(a)*d}px)`;
    });

    jBase.addEventListener('touchend', () => { mx=0; my=0; jStick.style.left='50%'; jStick.style.top='50%'; });

    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        weaponImg.style.transform = 'translateY(30px) scale(1.1) rotate(-2deg)';
        setTimeout(() => weaponImg.style.transform = 'translateY(0) scale(1) rotate(0)', 50);
        checkHit();
    };

    function checkHit() {
        enemies.forEach((e, i) => {
            let size = 20 + (e.z * 150);
            let xPos = canvas.width/2 + (e.x - canvas.width/2) * (e.z * 2);
            if(Math.hypot(xPos - canvas.width/2, e.y - canvas.height/2) < size) {
                enemies.splice(i, 1);
                cash += 100; document.getElementById('cash').innerText = cash;
            }
        });
    }

    function spawn() {
        enemies.push({ x: Math.random()*canvas.width, y: canvas.height/2, z: 0.1 });
        setTimeout(spawn, 1200);
    }

    function loop() {
        // Sky & Floor
        ctx.fillStyle = '#1b2838'; ctx.fillRect(0, 0, canvas.width, canvas.height/2);
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

        // Grid Lines (3D Effect)
        ctx.strokeStyle = '#34495e'; ctx.lineWidth = 2;
        for(let i=-2000; i<4000; i+=200) {
            ctx.beginPath(); ctx.moveTo(i + (mx*-150), canvas.height); ctx.lineTo(canvas.width/2, canvas.height/2); ctx.stroke();
        }

        enemies.forEach((e, i) => {
            e.z += 0.006; e.y += (e.z * 8);
            let size = 15 + (e.z * 150);
            let xPos = canvas.width/2 + (e.x - canvas.width/2) * (e.z * 2) + (mx*-100);
            
            ctx.fillStyle = '#c0392b';
            ctx.beginPath(); ctx.arc(xPos, e.y, size, 0, 7); ctx.fill();
            
            if(e.y > canvas.height) enemies.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }

    spawn(); loop();
</script>
</body>
</html>

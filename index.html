
<body

<div id="lobby" class="screen">
    <h1 style="letter-spacing: 5px;">BATTLEGROUND Z</h1>
    <p>MOBILE HUD V3.0</p>
    <button class="start-btn" onclick="start()">START GAME</button>
</div>

<div class="controls">
    <div class="btn" id="sprint">🏃</div>
    <div class="joy-base" id="jBase"><div class="joy-stick" id="jStick"></div></div>
    <div class="btn" id="fire">🔥</div>
    <div class="btn" id="jump">🚀</div>
    <div class="btn" id="sit">⬇️</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let playing = false;
    const player = { x: canvas.width/2, y: canvas.height/2, r: 20, speed: 5, normal: 5 };
    const bullets = []; const enemies = [];

    // نظام الجويستيك
    let moveX = 0, moveY = 0;
    const jBase = document.getElementById('jBase');
    const jStick = document.getElementById('jStick');

    jBase.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = jBase.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = touch.clientX - centerX;
        const dy = touch.clientY - centerY;
        const dist = Math.min(Math.hypot(dx, dy), 40);
        const angle = Math.atan2(dy, dx);
        
        moveX = (Math.cos(angle) * dist) / 40;
        moveY = (Math.sin(angle) * dist) / 40;
        
        jStick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
        jStick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
    });

    jBase.addEventListener('touchend', () => {
        moveX = 0; moveY = 0;
        jStick.style.left = '50%'; jStick.style.top = '50%';
    });

    document.getElementById('fire').ontouchstart = (e) => { e.preventDefault(); bullets.push({x: player.x, y: player.y}); };
    document.getElementById('sprint').ontouchstart = (e) => { e.preventDefault(); player.speed = 10; };
    document.getElementById('sprint').ontouchend = () => player.speed = player.normal;

    function start() { document.getElementById('lobby').style.display='none'; playing=true; spawn(); loop(); }
    function spawn() { if(playing) { enemies.push({x: Math.random()*canvas.width, y: -20, r: 20}); setTimeout(spawn, 2000); } }

    function loop() {
        if(!playing) return;
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,canvas.width, canvas.height);

        player.x += moveX * player.speed; player.y += moveY * player.speed;

        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = "#f1c40f"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.stroke();

        bullets.forEach((b, i) => {
            b.y -= 12; ctx.fillStyle = "#e74c3c"; ctx.fillRect(b.x-2, b.y, 4, 15);
        });

        enemies.forEach((e, i) => {
            e.y += 2.5; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = "#e74c3c"; ctx.fill();
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>

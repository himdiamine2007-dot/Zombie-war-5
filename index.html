
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-War Mobile: Evolution</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; background: radial-gradient(circle, #2c3e50, #000); width: 100vw; height: 100vh; }
        
        /* HUD - واجهة فري فاير */
        .controls { position: fixed; inset: 0; pointer-events: none; z-index: 100; font-family: sans-serif; }
        .btn { position: absolute; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; touch-action: none; backdrop-filter: blur(4px); }
        .btn:active { background: rgba(241, 196, 15, 0.4); transform: scale(0.9); }

        /* الجويستيك الاحترافي */
        .joystick-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); pointer-events: auto; }
        .joystick-stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 2px solid #fff; }

        /* أزرار الأفعال */
        #fire { bottom: 50px; right: 40px; width: 90px; height: 90px; background: rgba(231, 76, 60, 0.3); border: 3px solid #e74c3c; font-size: 24px; }
        #jump { bottom: 150px; right: 50px; width: 55px; height: 55px; }
        #crouch { bottom: 50px; right: 150px; width: 55px; height: 55px; }
        #run { top: 20px; left: 20px; width: 50px; height: 50px; background: rgba(46, 204, 113, 0.3); border-color: #2ecc71; }

        /* شاشة البداية */
        .start-screen { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #f1c40f; }
        .start-btn { padding: 15px 60px; background: #f1c40f; border: none; border-radius: 30px; font-weight: bold; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="lobby" class="start-screen">
    <h1>BATTLEGROUND Z</h1>
    <p>VERSION 2.0 - MODIFIED HUD</p>
    <button class="start-btn" onclick="start()">START MISSION</button>
</div>

<div class="controls">
    <div class="btn" id="run">🏃</div>
    <div class="joystick-base" id="joyBase"><div class="joystick-stick" id="joyStick"></div></div>
    <div class="btn" id="fire">🔥</div>
    <div class="btn" id="jump">🚀</div>
    <div class="btn" id="crouch">⬇️</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let playing = false;
    const player = { x: canvas.width/2, y: canvas.height/2, r: 20, speed: 5 };
    const enemies = []; const bullets = [];

    // تحكم الجويستيك
    let moveX = 0, moveY = 0;
    const joyBase = document.getElementById('joyBase');
    const joyStick = document.getElementById('joyStick');

    joyBase.addEventListener('touchmove', e => {
        const touch = e.touches[0];
        const rect = joyBase.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        moveX = (touch.clientX - centerX) / 60;
        moveY = (touch.clientY - centerY) / 60;
        
        // بقاء العصا داخل الدائرة
        const dist = Math.hypot(touch.clientX - centerX, touch.clientY - centerY);
        const angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
        const limitedDist = Math.min(dist, 40);
        joyStick.style.left = `calc(50% + ${Math.cos(angle) * limitedDist}px)`;
        joyStick.style.top = `calc(50% + ${Math.sin(angle) * limitedDist}px)`;
    });

    joyBase.addEventListener('touchend', () => {
        moveX = 0; moveY = 0;
        joyStick.style.left = '50%'; joyStick.style.top = '50%';
    });

    document.getElementById('fire').ontouchstart = (e) => { e.preventDefault(); bullets.push({x: player.x, y: player.y}); };

    function start() { document.getElementById('lobby').style.display='none'; playing=true; spawn(); loop(); }

    function spawn() { if(playing) { enemies.push({x: Math.random()*canvas.width, y: -20, r: 20}); setTimeout(spawn, 2000); } }

    function loop() {
        if(!playing) return;
        ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height);

        player.x += moveX * player.speed; player.y += moveY * player.speed;

        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = "#f1c40f"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.stroke();

        bullets.forEach((b, i) => {
            b.y -= 10; ctx.fillStyle = "red"; ctx.fillRect(b.x-2, b.y, 4, 15);
        });

        enemies.forEach((e, i) => {
            e.y += 2; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = "red"; ctx.fill();
        });

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>

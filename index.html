
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مغامرة النحلة الزوينة</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        canvas { display: block; background: linear-gradient(#87CEEB, #E0F7FA); }
        
        /* واجهة النقط */
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; font-size: 30px; font-weight: bold; color: #FFD700; text-shadow: 2px 2px #000; pointer-events: none; }
        
        /* أزرار التحكم (يمين ويسار) */
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; padding: 0 20px; box-sizing: border-box; }
        .move-btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.7); border: 5px solid #FFD700; border-radius: 50%; font-size: 40px; display: flex; align-items: center; justify-content: center; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">🌸 الورد: <span id="score">0</span></div>

<div class="controls">
    <div class="move-btn" id="left">⬅️</div>
    <div class="move-btn" id="right">➡️</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let playing = true;
    const player = { x: canvas.width / 2, y: canvas.height - 120, w: 60, h: 60, speed: 7 };
    const items = [];

    // تحكم اللمس
    let moveLeft = false;
    let moveRight = false;

    document.getElementById('left').ontouchstart = () => moveLeft = true;
    document.getElementById('left').ontouchend = () => moveLeft = false;
    document.getElementById('right').ontouchstart = () => moveRight = true;
    document.getElementById('right').ontouchend = () => moveRight = false;

    function spawnItem() {
        if (!playing) return;
        const types = [
            { char: '🌸', type: 'good', score: 10 },
            { char: '🌼', type: 'good', score: 20 },
            { char: '💣', type: 'bad', score: 0 }
        ];
        const item = types[Math.floor(Math.random() * types.length)];
        items.push({ 
            x: Math.random() * (canvas.width - 40), 
            y: -50, 
            char: item.char, 
            type: item.type,
            points: item.score,
            speed: 3 + Math.random() * 3 
        });
        setTimeout(spawnItem, 1000);
    }

    function loop() {
        if (!playing) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // تحريك اللاعب
        if (moveLeft && player.x > 0) player.x -= player.speed;
        if (moveRight && player.x < canvas.width - player.w) player.x += player.speed;

        // رسم "النحلة" (اللاعب)
        ctx.font = '50px Arial';
        ctx.fillText('🐝', player.x, player.y);

        // تحريك ورسم الأشياء (الورد والقنابل)
        items.forEach((item, index) => {
            item.y += item.speed;
            ctx.fillText(item.char, item.x, item.y);

            // تصادم
            if (item.y > player.y - 40 && item.y < player.y + 20 &&
                item.x > player.x - 40 && item.x < player.x + 40) {
                
                if (item.type === 'good') {
                    score += item.points;
                    document.getElementById('score').innerText = score;
                    items.splice(index, 1);
                } else {
                    alert("أوه! انتبه من القنبلة! 🙀\nنقاطك: " + score);
                    score = 0;
                    document.getElementById('score').innerText = score;
                    items.length = 0;
                }
            }

            // مسح الأشياء اللي خرجات من الشاشة
            if (item.y > canvas.height) items.splice(index, 1);
        });

        requestAnimationFrame(loop);
    }

    spawnItem();
    loop();
</script>
</body>
</html>

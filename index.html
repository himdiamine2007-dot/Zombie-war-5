
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS:GO Strike Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: url('https://img.freepik.com/free-photo/war-zone-background-with-ruined-buildings_23-2149425404.jpg') center/cover; }
        
        /* CS:GO Crosshair */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: none; pointer-events: none; }
        #crosshair::before { content: ''; position: absolute; left: 14px; width: 2px; height: 30px; background: #0f0; box-shadow: 0 0 5px #0f0; }
        #crosshair::after { content: ''; position: absolute; top: 14px; width: 30px; height: 2px; background: #0f0; box-shadow: 0 0 5px #0f0; }

        /* HUD الاحترافي */
        .hud { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.8); color: #f1c40f; padding: 10px 20px; border-radius: 4px; border-bottom: 3px solid #f1c40f; font-weight: bold; font-size: 20px; }

        /* السلاح M4A1 */
        #weapon { position: absolute; bottom: -20px; right: 5%; width: 350px; pointer-events: none; z-index: 10; transition: transform 0.05s; }

        /* التحكم */
        .btn { position: absolute; pointer-events: auto; background: rgba(255,255,255,0.1); border: 2px solid #f1c40f; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #fire-btn { bottom: 40px; right: 40px; width: 100px; height: 100px; color: #fff; font-weight: bold; }
        #joy-base { bottom: 40px; left: 40px; width: 130px; height: 130px; border: 1px solid #444; }
        #joy-stick { position: absolute; width: 60px; height: 60px; background: #555; border-radius: 50%; left: 35px; top: 35px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="crosshair"></div>
    <div class="hud">
        <div class="stat">HP: 100</div>
        <div class="stat">💰 $<span id="cash">0</span></div>
    </div>
    
    <img id="weapon" src="https://www.freeiconspng.com/uploads/csgo-m4a1-s-png-3.png">

    <div id="joy-base" class="btn"><div id="joy-stick"></div></div>
    <button id="fire-btn" class="btn">SHOOT</button>
    <div id="zombie-layer"></div>
</div>

<script>
    let cash = 0;
    const weapon = document.getElementById('weapon');
    const fireBtn = document.getElementById('fire-btn');

    // تأثير الضرب
    fireBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        cash += 50;
        document.getElementById('cash').innerText = cash;
        weapon.style.transform = 'translateY(20px) rotate(-5deg) scale(1.1)';
        setTimeout(() => weapon.style.transform = 'translateY(0) rotate(0) scale(1)', 50);
        spawnZombie();
    });

    function spawnZombie() {
        const z = document.createElement('img');
        z.src = 'https://i.imgur.com/vHIn8mS.png'; // صورة زومبي حقيقية (PNG)
        z.style.position = 'absolute';
        z.style.width = '150px';
        z.style.left = Math.random() * (window.innerWidth - 150) + 'px';
        z.style.top = '20%';
        z.style.transition = 'top 3s linear';
        document.getElementById('zombie-layer').appendChild(z);
        
        setTimeout(() => z.style.top = '100%', 100);
        setTimeout(() => z.remove(), 3100);
    }
</script>
</body>
</html>




<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Strike - Battle Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.4); border: 4px solid #fff; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #fire-btn { background: rgba(255, 0, 0, 0.6); border-color: #ff0000; font-size: 20px; color: white; font-weight: bold; }
        #shop-btn { position: fixed; top: 45px; right: 20px; background: #FFD700; border: 2px solid #fff; padding: 8px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div>💰 <span id="coins">0</span></div>
        <div>🚀 ليفل: <span id="lvl">1</span></div>
    </div>
    <div id="shop-btn" onclick="alert('جمع 1000 نقطة لفتح المتجر!')">🛒 المتجر</div>

    <div class="controls">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="l">⬅️</div>
            <div class="btn" id="r">➡️</div>
        </div>
        <div class="btn" id="fire-btn">FIRE</div>
    </div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let coins = 0, level = 1, px = canvas.width/2-30;
        let items = [], bullets = [], pBullets = [], wall = null;
        let ml = false, mr = false;

        document.getElementById('l').ontouchstart = (e) => { e.preventDefault(); ml = true; };
        document.getElementById('l').ontouchend = () => ml = false;
        document.getElementById('r').ontouchstart = (e) => { e.preventDefault(); mr = true; };
        document.getElementById('r').ontouchend = () => mr = false;
        
        // زر النار لتفجير الحواجز والوحوش
        document.getElementById('fire-btn').ontouchstart = (e) => {
            e.preventDefault();
            pBullets.push({x: px + 25, y: canvas.height - 150});
        };

        function loop() {
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0,0,canvas.width, canvas.height);
            
            if(ml && px > 0) px -= 8; if(mr && px < canvas.width - 60) px += 8;
            ctx.font = '55px Arial';
            ctx.fillText('🐝', px, canvas.height - 120);

            // نظام الحاجز (Level 2+)
            if(level >= 2 && !wall) {
                wall = { x: 0, y: canvas.height/2, h: 40, hp: 5 };
            }
            if(wall) {
                ctx.fillStyle = '#444';
                ctx.fillRect(wall.x, wall.y, canvas.width, wall.h);
                ctx.fillStyle = 'white'; ctx.font = '20px Arial';
                ctx.fillText('حاجز الطريق: اضرب 5 مرات للفوز!', canvas.width/2-100, wall.y+25);
            }

            // رصاص اللاعب
            pBullets.forEach((pb, pbi) => {
                pb.y -= 10; ctx.fillText('⚡', pb.x, pb.y);
                if(wall && pb.y < wall.y + 40 && pb.y > wall.y) {
                    wall.hp--; pBullets.splice(pbi,1);
                    if(wall.hp <= 0) { wall = null; coins += 100; level++; }
                }
                if(pb.y < 0) pBullets.splice(pbi,1);
            });

            items.forEach((it, i) => {
                it.y += it.s; ctx.fillText(it.char, it.x, it.y);
                if(it.bad && Math.random() > 0.97) bullets.push({x: it.x+15, y: it.y+20, s: 6});

                if(it.y > canvas.height - 150 && it.y < canvas.height - 70 && Math.abs(it.x - px) < 50) {
                    if(it.bad) { gameOver(); }
                    else { coins += 5; document.getElementById('coins').innerText = coins; } // نقاط قليلة
                    items.splice(i, 1);
                }
                if(it.y > canvas.height) items.splice(i, 1);
            });

            bullets.forEach((b, bi) => {
                b.y += b.s; ctx.fillText('🔥', b.x, b.y);
                if(b.y > canvas.height - 150 && b.y < canvas.height - 70 && Math.abs(b.x - px) < 40) gameOver();
                if(b.y > canvas.height) bullets.splice(bi, 1);
            });

            requestAnimationFrame(loop);
        }

        function gameOver() {
            alert("خسرتي! حاول تجمع كثر 💰");
            location.reload();
        }

        setInterval(() => {
            let r = Math.random();
            // وحوش أكثر في الليفل العالي
            let char = r > 0.4 ? '👾' : '🌸';
            items.push({x: Math.random()*(canvas.width-50), y: -50, s: 4 + level, char: char, bad: char==='👾'});
        }, 800);

        loop();
    </script>
</body>
</html>

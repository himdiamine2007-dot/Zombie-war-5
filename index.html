
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy World Tour - Kids Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* واجهة سهلة للأطفال */
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .box { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 15px; border: 2px solid #fff; backdrop-filter: blur(5px); color: white; font-weight: bold; font-size: 20px; }

        #city-name { position: fixed; top: 55px; width: 100%; text-align: center; color: #FFD700; font-size: 24px; font-weight: 900; text-shadow: 2px 2px #000; z-index: 5; }

        /* أنيميشن النرد */
        #dice-screen { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 100; }
        #rolling { font-size: 120px; animation: bounce 0.4s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3) rotate(10deg); } }

        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .btn { width: 90px; height: 90px; background: rgba(255,255,255,0.3); border: 3px solid #fff; border-radius: 50%; font-size: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #fire-btn { background: #ff4444; border-color: #fff; }
    </style>
</head>
<body>

<div id="ui">
    <div class="box">❤️ <span id="hp">100</span></div>
    <div class="box">💎 <span id="coins">0</span></div>
</div>

<div id="city-name">PARIS 🗼</div>
<div id="dice-screen"><div id="rolling">🎲</div></div>

<div class="controls">
    <div style="display:flex; gap:20px;">
        <div class="btn" id="l">⬅️</div>
        <div class="btn" id="r">➡️</div>
    </div>
    <div class="btn" id="fire-btn">💥</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let coins = 0, hp = 100, px = canvas.width/2-35;
    let enemies = [], particles = [], dices = [], ml = false, mr = false;
    let bgIdx = 0;

    // صور الخلفيات الحقيقية
    const worlds = [
        { n: 'PARIS 🗼', url: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1000&auto=format&fit=crop' },
        { n: 'DUBAI 🏙️', url: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?q=80&w=1000&auto=format&fit=crop' },
        { n: 'EGYPT 🏜️', url: 'https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?q=80&w=1000&auto=format&fit=crop' }
    ];

    const bgImg = new Image();
    bgImg.src = worlds[bgIdx].url;

    const setupBtn = (id, act) => { const b = document.getElementById(id); b.ontouchstart=(e)=>{e.preventDefault(); act(true)}; b.ontouchend=()=>act(false); };
    setupBtn('l', v=>ml=v); setupBtn('r', v=>mr=v);

    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        // ضربة واسعة وسهلة للأطفال
        enemies.forEach((en, i) => {
            if(Math.abs(en.x - px) < 180) { // مساحة تفركيع كبيرة
                explode(en.x, en.y, '#fff');
                enemies.splice(i, 1); coins += 10;
                document.getElementById('coins').innerText = coins;
                if(coins % 100 === 0 && bgIdx < worlds.length-1) {
                    bgIdx++; bgImg.src = worlds[bgIdx].url;
                    document.getElementById('city-name').innerText = worlds[bgIdx].n;
                }
                if(Math.random() > 0.6) dices.push({x: en.x, y: en.y});
            }
        });
    };

    function openDice() {
        const screen = document.getElementById('dice-screen');
        screen.style.display = 'flex';
        setTimeout(() => {
            screen.style.display = 'none';
            hp = Math.min(100, hp + 50); // هدية كبيرة
            document.getElementById('hp').innerText = hp;
        }, 1200);
    }

    function explode(x, y, c) { for(let i=0; i<10; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, c}); }

    function loop() {
        if(hp <= 0) return;
        
        // رسم الخلفية الحقيقية
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; // تغميق خفيف باش يبان اللعب
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if(ml && px > 0) px -= 8; if(mr && px < canvas.width - 70) px += 8;
        
        ctx.font = '70px Arial';
        ctx.fillText('🚀', px, canvas.height - 100);

        dices.forEach((d, i) => {
            d.y += 3; ctx.fillText('🎲', d.x, d.y);
            if(Math.abs(d.x - px) < 70 && d.y > canvas.height - 150) { dices.splice(i,1); openDice(); }
        });

        enemies.forEach((en, i) => {
            en.y += en.s; ctx.fillText(en.char, en.x, en.y);
            // وحوش سهلة ما كتضربش بزاف
            if(en.y > canvas.height - 130 && Math.abs(en.x - px) < 60) {
                hp -= 10; explode(px, canvas.height-100, '#ff0');
                enemies.splice(i, 1); document.getElementById('hp').innerText = hp;
            }
            if(en.y > canvas.height) enemies.splice(i, 1);
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; ctx.fillStyle=p.c; ctx.globalAlpha=p.life; ctx.fillRect(p.x,p.y,5,5); if(p.life<=0) particles.splice(i,1); });
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        // وحوش قليلة وبطيئة للأطفال
        enemies.push({x: Math.random()*(canvas.width-80)+40, y: -50, s: 2, char: Math.random()>0.5?'👽':'👾'});
    }, 1500);

    loop();
</script>
</body>
</html>

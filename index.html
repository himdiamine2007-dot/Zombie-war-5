<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Strike: Global Offensive V5</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #1a1a1a; }
        
        /* أرضية اللعبة (3D Floor Effect) */
        canvas { display: block; width: 100%; height: 100%; background: linear-gradient(to bottom, #050505 0%, #1b2838 50%, #0a0a0a 100%); }

        /* CS:GO Crosshair الاحترافي */
        .crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; pointer-events: none; }
        .crosshair:before { content: ''; position: absolute; left: 14px; width: 2px; height: 30px; background: #0f0; box-shadow: 0 0 5px #0f0; }
        .crosshair:after { content: ''; position: absolute; top: 14px; width: 30px; height: 2px; background: #0f0; box-shadow: 0 0 5px #0f0; }

        /* HUD - واجهة المعلومات */
        .hud { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; color: #f1c40f; pointer-events: none; z-index: 100; }
        .stat-item { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; border-bottom: 3px solid #f1c40f; font-size: 20px; font-weight: bold; }

        /* السلاح (Gun) - باش تحس باللعبة */
        #weapon { position: fixed; bottom: -20px; right: 10%; width: 300px; transform: rotate(-5deg); pointer-events: none; filter: drop-shadow(0 0 10px #000); }

        /* التحكم */
        .controls { position: fixed; inset: 0; pointer-events: none; }
        #fire-btn { position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 4px solid #f1c40f; border-radius: 50%; color: #fff; font-weight: bold; pointer-events: auto; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid #444; pointer-events: auto; }
        #joy-stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: #555; border-radius: 50%; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="crosshair"></div>
    
    <div class="hud">
        <div class="stat-item">HP: 100</div>
        <div class="stat-item">💰 $<span id="money">0</span></div>
        <div class="stat-item" style="color:#ff4444;">BOSS IN: <span id="timer">02:00</span></div>
    </div>

    <svg id="weapon" viewBox="0 0 200 100">
        <rect x="50" y="40" width="120" height="30" fill="#333" rx="5"/>
        <rect x="150" y="35" width="40" height="15" fill="#222" />
        <rect x="60" y="60" width="20" height="40" fill="#222" rx="2" transform="rotate(20 60 60)"/>
    </svg>

    <div class="controls">
        <div id="joy-base"><div id="joy-stick"></div></div>
        <button id="fire-btn">FIRE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let money = 0; let time = 120;
    const enemies = [];
    
    // تحكم الجويستيك (Joystick)
    let mx = 0, my = 0;
    const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');

    jBase.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const r = jBase.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
        const dist = Math.min(Math.hypot(dx, dy), 45), ang = Math.atan2(dy, dx);
        mx = (Math.cos(ang) * dist) / 45; my = (Math.sin(ang) * dist) / 45;
        jStick.style.left = `calc(50% + ${Math.cos(ang)*dist}px)`;
        jStick.style.top = `calc(50% + ${Math.sin(ang)*dist}px)`;
    });

    jBase.addEventListener('touchend', () => { mx=0; my=0; jStick.style.left='50%'; jStick.style.top='50%'; });

    // نظام الوحوش
    function spawn() {
        enemies.push({ x: Math.random()*canvas.width, y: -50, z: 0.5, speed: 2 });
        setTimeout(spawn, 1500);
    }

    function loop() {
        ctx.fillStyle = "#0b0e11"; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        // رسم خطوط الأرضية لإعطاء إحساس بالعمق (3D Effect)
        ctx.strokeStyle = "#333";
        for(let i=0; i<canvas.width; i+=100) {
            ctx.beginPath(); ctx.moveTo(i, canvas.height); ctx.lineTo(canvas.width/2, canvas.height/2); ctx.stroke();
        }

        enemies.forEach((e, i) => {
            e.y += e.speed;
            let size = 20 + (e.y / 10); // الوحوش كيكبروا فاش كيقربوا
            ctx.fillStyle = "#ff4444";
            ctx.beginPath(); ctx.arc(e.x, e.y, size, 0, Math.PI*2); ctx.fill();
            
            // إضافة ظل للوحش
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.ellipse(e.x, e.y+size, size, size/3, 0, 0, Math.PI*2); ctx.fill();
        });

        requestAnimationFrame(loop);
    }

    spawn(); loop();
</script>
</body>
</html>

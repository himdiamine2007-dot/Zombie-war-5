<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Survival: FF Style</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a202c 0%, #000 100%); }
        .hud { position: fixed; top: 10px; left: 10px; color: #f1c40f; font-weight: bold; z-index: 10; font-family: monospace; }
        
        /* أزرار التحكم - تصميم قتالي شفاف */
        .controls { position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; }
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; touch-action: none; }
        .d-pad { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; }
        #fire-btn { position: absolute; bottom: 30px; right: 30px; width: 90px; height: 90px; background: rgba(231, 76, 60, 0.4); border: 2px solid #e74c3c; font-weight: bold; }
        #run-btn { position: absolute; bottom: 180px; left: 70px; background: rgba(46, 204, 113, 0.3); }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; }
        input { padding: 10px; border-radius: 20px; border: 2px solid #f1c40f; background: #111; color: white; margin-bottom: 20px; text-align: center; }
        button { padding: 10px 40px; background: #f1c40f; color: #000; border: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="hud">👤: <span id="n">...</span> | 🏆: <span id="l">1</span> | 💰: <span id="c">0</span></div>

<div id="start-screen" class="overlay">
    <h1 style="color:#f1c40f">BATTLEGROUND Z</h1>
    <input type="text" id="name-in" placeholder="اكتب اسمك...">
    <button onclick="startGame()">START GAME</button>
</div>

<div class="controls">
    <div class="btn" id="run-btn">🏃</div>
    <div class="d-pad">
        <div></div><div class="btn" id="u">↑</div><div></div>
        <div class="btn" id="l-btn">←</div><div></div><div class="btn" id="r-btn">→</div>
        <div></div><div class="btn" id="d">↓</div><div></div>
    </div>
    <div class="btn" id="fire-btn">FIRE</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let active = false; let score = 0; let level = 1; let pName = "";
    const player = { x: canvas.width/2, y: canvas.height/2, r: 20, speed: 5, color: '#f1c40f' };
    const bullets = []; const enemies = []; const keys = {};

    const setupBtn = (id, k) => {
        const el = document.getElementById(id);
        el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
        el.ontouchend = () => keys[k] = false;
    };
    setupBtn('u','u'); setupBtn('d','d'); setupBtn('l-btn','l'); setupBtn('r-btn','r');

    document.getElementById('run-btn').ontouchstart = (e) => { e.preventDefault(); player.speed = 10; };
    document.getElementById('run-btn').ontouchend = () => player.speed = 5;

    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        bullets.push({ x: player.x, y: player.y, v: 12 });
    };

    function startGame() {
        pName = document.getElementById('name-in').value || "Warrior";
        document.getElementById('n').innerText = pName;
        document.getElementById('start-screen').style.display = 'none';
        active = true; spawn(); draw();
    }

    function spawn() {
        if(!active) return;
        let isBoss = (level % 3 === 0 && enemies.filter(e=>e.b).length === 0);
        enemies.push({ x: Math.random()*canvas.width, y: -50, b: isBoss, hp: isBoss ? 20 : 2, r: isBoss ? 50 : 20 });
        setTimeout(spawn, 2000/level);
    }

    function draw() {
        if(!active) return;
        ctx.clearRect(0,0,canvas.width, canvas.height);

        if(keys.u) player.y -= player.speed; if(keys.d) player.y += player.speed;
        if(keys.l) player.x -= player.speed; if(keys.r) player.x += player.speed;

        // رسم اللاعب (دائرة قتالية)
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = player.color; ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.fillText(pName, player.x-15, player.y-30);

        bullets.forEach((b, i) => {
            b.y -= b.v; ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x-2, b.y, 4, 15);
            if(b.y < 0) bullets.splice(i,1);
        });

        enemies.forEach((e, i) => {
            e.y += e.b ? 1 : 2;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = e.b ? "#8e44ad" : "#e74c3c"; ctx.fill();
            
            bullets.forEach((b, bi) => {
                let d = Math.hypot(b.x - e.x, b.y - e.y);
                if(d < e.r) {
                    e.hp--; bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        score += 10; enemies.splice(i, 1);
                        document.getElementById('c').innerText = score;
                    }
                }
            });
        });
        requestAnimationFrame(draw);
    }
</script>
</body>
</html>

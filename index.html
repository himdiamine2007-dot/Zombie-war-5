<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival 4K - Mega Shop Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; }
        canvas { display: block; }
        #ui { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 20; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 20px; border: 2px solid #00d4ff; font-size: 18px; backdrop-filter: blur(5px); }
        
        /* المتجر */
        #shop-btn { position: fixed; top: 70px; right: 15px; background: #FFD700; color: #000; padding: 8px 15px; border-radius: 12px; font-weight: 900; z-index: 30; border: 2px solid #fff; }
        #shop-menu { display: none; position: fixed; inset: 40px 20px; background: rgba(0,0,10,0.95); border: 3px solid #FFD700; border-radius: 25px; z-index: 100; padding: 20px; text-align: center; overflow-y: auto; }
        .item { background: rgba(255,255,255,0.1); margin: 10px 0; padding: 15px; border-radius: 15px; border: 1px solid #00d4ff; }
        .buy-btn { background: #00d4ff; color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; margin-top: 5px; }

        #dice-anim { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 110; }
        #dice-rolling { font-size: 150px; animation: spin 0.4s infinite; }
        @keyframes spin { 0% { transform: scale(1) rotate(0); } 50% { transform: scale(1.3) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); } }

        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; }
        #fire-btn { background: #ff4444; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">❤️ <span id="hp">100</span></div>
    <div class="stat">💎 <span id="coins">0</span></div>
</div>

<button id="shop-btn" onclick="toggleShop()">🛒 SHOP</button>

<div id="shop-menu">
    <h1 style="color:#FFD700">SPACE STORE</h1>
    <div class="item"><h3>🛡️ Shield (10s)</h3><p>Cost: 50 💎</p><button class="buy-btn" onclick="buy('shield', 50)">BUY</button></div>
    <div class="item"><h3>⚡ Mega Blast</h3><p>Cost: 100 💎</p><button class="buy-btn" onclick="buy('blast', 100)">BUY</button></div>
    <div class="item"><h3>🛸 Golden Ship</h3><p>Cost: 300 💎</p><button class="buy-btn" onclick="buy('ship', 300)">BUY</button></div>
    <button style="background:red; color:white; padding:10px; margin-top:10px; border-radius:10px;" onclick="toggleShop()">CLOSE</button>
</div>

<div id="dice-anim"><div id="dice-rolling">🎲</div></div>

<div class="controls">
    <div style="display:flex; gap:15px;"><div class="btn" id="l">⬅️</div><div class="btn" id="r">➡️</div></div>
    <div class="btn" id="fire-btn">💥</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let coins = 0, hp = 100, px = canvas.width/2-35, bgIdx = 0, skin = '🚀';
    let enemies = [], particles = [], dices = [], ml = false, mr = false, isShield = false;

    function toggleShop() { 
        const m = document.getElementById('shop-menu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function buy(item, price) {
        if(coins >= price) {
            coins -= price; document.getElementById('coins').innerText = coins;
            if(item === 'shield') { isShield = true; setTimeout(()=>isShield=false, 10000); }
            if(item === 'blast') { explodeAll(); }
            if(item === 'ship') { skin = '🛸'; }
            toggleShop();
        } else { alert("💎 Not enough coins!"); }
    }

    function explodeAll() { enemies.forEach(en => explode(en.x, en.y, '#fff')); enemies = []; }

    function drawCity() {
        let g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        if(bgIdx === 0) { g.addColorStop(0, '#1e3c72'); g.addColorStop(1, '#2a5298'); } 
        else if(bgIdx === 1) { g.addColorStop(0, '#f8b500'); g.addColorStop(1, '#fceabb'); }
        else { g.addColorStop(0, '#e65c00'); g.addColorStop(1, '#F9D423'); }
        ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        if(bgIdx === 0) { ctx.fillRect(canvas.width/2-20, canvas.height-250, 40, 150); } // Paris
        else if(bgIdx === 1) { ctx.fillRect(canvas.width/2-10, canvas.height-400, 20, 300); } // Dubai
        else { ctx.beginPath(); ctx.moveTo(50, canvas.height-100); ctx.lineTo(150, canvas.height-250); ctx.lineTo(250, canvas.height-100); ctx.fill(); } // Egypt
    }

    const setupBtn = (id, act) => { const b = document.getElementById(id); b.ontouchstart=(e)=>{e.preventDefault(); act(true)}; b.ontouchend=()=>act(false); };
    setupBtn('l', v=>ml=v); setupBtn('r', v=>mr=v);

    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        enemies.forEach((en, i) => {
            if(Math.abs(en.x - px) < 150) {
                explode(en.x, en.y, '#fff'); enemies.splice(i, 1); coins += 5;
                document.getElementById('coins').innerText = coins;
                if(coins % 100 === 0 && bgIdx < 2) bgIdx++;
                if(Math.random() > 0.7) dices.push({x: en.x, y: en.y});
            }
        });
    };

    function rollDice() {
        document.getElementById('dice-anim').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('dice-anim').style.display = 'none';
            hp = Math.min(100, hp + 30); document.getElementById('hp').innerText = hp;
        }, 1200);
    }

    function explode(x, y, c) { for(let i=0; i<12; i++) particles.push({x, y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, life:1, c}); }

    function loop() {
        if(hp <= 0) return;
        drawCity();
        if(ml && px > 0) px -= 9; if(mr && px < canvas.width - 70) px += 9;
        
        if(isShield) { ctx.beginPath(); ctx.arc(px+35, canvas.height-85, 60, 0, Math.PI*2); ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 5; ctx.stroke(); }
        
        ctx.font = '70px Arial'; ctx.fillText(skin, px, canvas.height - 100);

        dices.forEach((d, i) => { d.y += 4; ctx.fillText('🎲', d.x, d.y); if(Math.abs(d.x - px) < 70 && d.y > canvas.height - 150) { dices.splice(i,1); rollDice(); } });

        enemies.forEach((en, i) => {
            en.y += en.s; ctx.fillText(en.char, en.x, en.y);
            if(en.y > canvas.height - 130 && Math.abs(en.x - px) < 60) {
                if(!isShield) hp -= 15;
                explode(px, canvas.height-100, '#ff0'); enemies.splice(i, 1);
                document.getElementById('hp').innerText = hp;
                if(hp <= 0) location.reload();
            }
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; ctx.fillStyle=p.c; ctx.globalAlpha=p.life; ctx.fillRect(p.x,p.y,5,5); if(p.life<=0) particles.splice(i,1); });
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }

    setInterval(() => { enemies.push({x: Math.random()*(canvas.width-80)+40, y: -50, s: 2.5, char: Math.random()>0.5?'👽':'👾'}); }, 1200);
    loop();
</script>
</body>
</html>

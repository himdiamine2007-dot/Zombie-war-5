
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival Dice World Tour 🎲</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        .val { color: #00d4ff; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; }
        #fire-btn { background: rgba(255, 0, 0, 0.4); border-color: #ff0000; }
        #power-up-txt { position: fixed; top: 70px; width: 100%; text-align: center; color: #0f0; font-weight: bold; font-size: 20px; display: none; text-shadow: 2px 2px #000; }
        #reload-box { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); width: 60%; height: 10px; background: #333; border: 1px solid #fff; display: none; }
        #reload-fill { width: 0%; height: 100%; background: #00d4ff; }
    </style>
</head>
<body>

<div id="ui">
    <div>⏱️ نجاة: <span class="val" id="score">0</span>s</div>
    <div>💰: <span class="val" id="coins">0</span></div>
    <div>❤️: <span class="val" id="hp">100</span>%</div>
</div>
<div id="power-up-txt"></div>
<div id="reload-box"><div id="reload-fill"></div></div>

<div class="controls">
    <div style="display:flex; gap:10px;">
        <div class="btn" id="l">⬅️</div>
        <div class="btn" id="r">➡️</div>
    </div>
    <div class="btn" id="fire-btn">🔥</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let score = 0, coins = 0, hp = 100, ammo = 10, reloading = false;
    let px = canvas.width/2-30, items = [], enemies = [], bullets = [], dices = [];
    let ml = false, mr = false;
    let powerUp = { active: false, type: '', timeLeft: 0 };
    let playerSpeed = 8;

    setInterval(() => { if(hp > 0) { score++; document.getElementById('score').innerText = score; } }, 1000);

    document.getElementById('l').ontouchstart = (e) => { e.preventDefault(); ml = true; };
    document.getElementById('l').ontouchend = () => ml = false;
    document.getElementById('r').ontouchstart = (e) => { e.preventDefault(); mr = true; };
    document.getElementById('r').ontouchend = () => mr = false;

    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        if(ammo > 0 && !reloading) {
            fireShot();
            if(powerUp.active && powerUp.type === 'double') { 
                setTimeout(fireShot, 100); // طلقة ثانية
            }
            ammo--; if(ammo === 0) startReload();
        }
    };

    function fireShot() {
        enemies.forEach((en, i) => {
            if(Math.abs(en.x - px) < 120) {
                en.y -= 150; // دفع
                if(Math.random() > 0.7) { // احتمال سقوط نرد عند الإصابة
                    dices.push({x: en.x, y: en.y, s: 4});
                }
            }
        });
    }

    function activatePowerUp() {
        const types = [
            {id: 'shield', name: '🛡️ درع حماية!', color: '#fff'},
            {id: 'double', name: '🚀🚀 إطلاق مزدوج!', color: '#ff0'},
            {id: 'speed', name: '⚡ سرعة فائقة!', color: '#0ff'},
            {id: 'health', name: '❤️ حياة إضافية!', color: '#f0f'}
        ];
        const p = types[Math.floor(Math.random() * types.length)];
        powerUp = { active: true, type: p.id, timeLeft: 10 };
        
        if(p.id === 'speed') playerSpeed = 15;
        if(p.id === 'health') { hp = Math.min(100, hp + 20); document.getElementById('hp').innerText = hp; }

        const txt = document.getElementById('power-up-txt');
        txt.innerText = p.name; txt.style.color = p.color; txt.style.display = 'block';

        let timer = setInterval(() => {
            powerUp.timeLeft--;
            if(powerUp.timeLeft <= 0) {
                clearInterval(timer);
                powerUp.active = false;
                playerSpeed = 8;
                txt.style.display = 'none';
            }
        }, 1000);
    }

    function startReload() {
        reloading = true; document.getElementById('reload-box').style.display = 'block';
        let w = 0;
        let inv = setInterval(() => {
            w += 0.16; document.getElementById('reload-fill').style.width = w + '%';
            if(w >= 100) { clearInterval(inv); ammo = 10; reloading = false; document.getElementById('reload-box').style.display = 'none'; }
        }, 100);
    }

    function loop() {
        if(hp <= 0) return;
        ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        if(ml && px > 0) px -= playerSpeed; if(mr && px < canvas.width - 60) px += playerSpeed;
        
        // رسم الدرع
        if(powerUp.active && powerUp.type === 'shield') {
            ctx.beginPath(); ctx.arc(px+30, canvas.height-85, 50, 0, Math.PI*2);
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3; ctx.stroke();
        }

        ctx.font = '55px Arial'; ctx.fillText('🚀', px, canvas.height - 80);

        // النرد (Lucky Dice)
        dices.forEach((d, i) => {
            d.y += d.s; ctx.fillText('🎲', d.x, d.y);
            if(Math.abs(d.x - px) < 50 && Math.abs(d.y - (canvas.height-100)) < 50) {
                activatePowerUp(); dices.splice(i, 1);
            }
        });

        enemies.forEach((en, i) => {
            en.y += en.s; ctx.fillText(en.char, en.x, en.y);
            if(en.y > canvas.height - 120 && en.y < canvas.height - 60 && Math.abs(en.x - px) < 50) {
                if(!(powerUp.active && powerUp.type === 'shield')) hp -= 20;
                enemies.splice(i,1); document.getElementById('hp').innerText = hp;
                if(hp <= 0) { alert("خسرتي! السكور: " + score); location.reload(); }
            }
        });

        items.forEach((it, i) => {
            it.y += 4; ctx.fillText('🌸', it.x, it.y);
            if(Math.abs(it.x - px) < 50 && Math.abs(it.y - (canvas.height-100)) < 50) {
                coins += 1; document.getElementById('coins').innerText = coins; items.splice(i,1);
            }
        });

        requestAnimationFrame(loop);
    }

    setInterval(() => {
        let r = Math.random();
        if(r > 0.4) enemies.push({x: Math.random()*(canvas.width-50), y: -50, s: 3+Math.random()*3, char: Math.random()>0.5?'👽':'🤖'});
        else items.push({x: Math.random()*(canvas.width-50), y: -50});
    }, 900);

    loop();
</script>
</body>
</html>

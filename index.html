<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Strike - Modern Warfare 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'SF Pro Display', sans-serif; touch-action: none; color: white; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.4)); }
        
        /* تصميم HUD عصري */
        #ui { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 16px; font-weight: 800; text-shadow: 0 0 10px #00d4ff; z-index: 10; pointer-events: none; text-transform: uppercase; letter-spacing: 1px; }
        .val { color: #00d4ff; font-weight: 900; font-size: 20px; }
        
        /* التحكم */
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; padding: 0 10px; box-sizing: border-box; }
        .btn { width: 85px; height: 85px; background: rgba(0, 212, 255, 0.08); border: 2px solid rgba(0, 212, 255, 0.5); border-radius: 20px; font-size: 35px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); transition: all 0.1s; }
        .btn:active { transform: scale(0.9); background: rgba(0, 212, 255, 0.2); }
        #fire-btn { background: rgba(255, 0, 0, 0.15); border-color: rgba(255, 0, 0, 0.6); box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        #fire-btn:active { background: rgba(255, 0, 0, 0.3); }

        /* شريط التعبئة */
        #reload-box { position: fixed; bottom: 135px; left: 50%; transform: translateX(-50%); width: 60%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; display: none; overflow: hidden; }
        #reload-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff4444, #ff0000); box-shadow: 0 0 15px #f00; }
        
        /* واجهة المتجر */
        #shop-menu { display: none; position: fixed; inset: 50px 20px; background: rgba(5,5,15,0.95); border: 2px solid #00d4ff; border-radius: 20px; color: white; padding: 20px; z-index: 100; text-align: center; backdrop-filter: blur(10px); }
        #shop-btn { position: fixed; top: 50px; right: 15px; background: rgba(255, 215, 0, 0.3); border: 1px solid #ffd700; color: #ffd700; padding: 5px 10px; border-radius: 8px; font-weight: bold; z-index: 20; text-shadow: 0 0 5px #ffd700; }
    </style>
</head>
<body>

<div id="ui">
    <div>🏆 SCORE<span class="val" id="score">0</span></div>
    <div>💎<span class="val" id="coins">0</span></div>
    <div>❤️<span class="val" id="hp">100</span>%</div>
</div>
<div id="shop-btn" onclick="toggleShop()">🛒 المتجر</div>

<div id="shop-menu">
    <h2>🏪 SPACE SHOP</h2>
    <p>COINS: <span id="shop-coins" class="val">0</span>💎</p>
    <button onclick="buy('🚀', 0)">🚀 DEFAULT</button><br><br>
    <button onclick="buy('🛸', 50)">🛸 ALIEN SHIP (50💎)</button><br><br>
    <button onclick="buy('🐉', 100)">🐉 DRAGON (100💎)</button><br><br>
    <button onclick="toggleShop()">CLOSE</button>
</div>

<div id="reload-box"><div id="reload-fill"></div></div>

<div class="controls">
    <div style="display:flex; gap:15px;">
        <div class="btn" id="l">⬅️</div>
        <div class="btn" id="r">➡️</div>
    </div>
    <div class="btn" id="fire-btn">💥</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let score = 0, coins = 0, hp = 100, ammo = 10, reloading = false;
    let px = canvas.width/2-30, skin = '🚀', enemies = [], items = [], particles = [], dices = [], pBullets = [];
    let ml = false, mr = false, shopOpen = false;

    setInterval(() => { if(hp > 0 && !shopOpen) { score++; document.getElementById('score').innerText = score; } }, 1000);

    // تحكم الأزرار
    const setupBtn = (id, action) => { const btn = document.getElementById(id); btn.ontouchstart = (e) => { e.preventDefault(); action(true); }; btn.ontouchend = () => action(false); };
    setupBtn('l', v => ml = v); setupBtn('r', v => mr = v);
    document.getElementById('fire-btn').ontouchstart = (e) => { e.preventDefault(); if(ammo > 0 && !reloading && !shopOpen) { pBullets.push({x: px+25, y: canvas.height-120}); ammo--; if(ammo === 0) startReload(); } };

    function toggleShop() { shopOpen = !shopOpen; document.getElementById('shop-menu').style.display = shopOpen?'block':'none'; document.getElementById('shop-coins').innerText = coins; }
    function buy(s, p) { if(coins >= p) { skin = s; coins -= p; document.getElementById('coins').innerText = coins; toggleShop(); } else alert("NOT ENOUGH COINS!"); }

    function startReload() { reloading = true; document.getElementById('reload-box').style.display = 'block'; let w = 0; let inv = setInterval(() => { w += 0.16; document.getElementById('reload-fill').style.width = w + '%'; if(w >= 100) { clearInterval(inv); ammo = 10; reloading = false; document.getElementById('reload-box').style.display = 'none'; } }, 100); }

    function explode(x, y, color) { for(let i=0; i<12; i++) particles.push({x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1, c: color}); }

    function loop() {
        if(hp <= 0) return;
        ctx.fillStyle = 'rgba(2, 2, 5, 0.4)'; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        if(ml && px > 0) px -= 9; if(mr && px < canvas.width - 60) px += 9;
        ctx.font = '55px Arial'; ctx.fillText(skin, px, canvas.height - 100);

        // ليزر اللاعب
        pBullets.forEach((pb, pbi) => {
            pb.y -= 15; ctx.fillStyle = '#00d4ff'; ctx.fillRect(pb.x, pb.y, 4, 20);
            enemies.forEach((en, ei) => {
                if(Math.abs(pb.x - en.x) < 55 && Math.abs(pb.y - en.y) < 55) {
                    explode(en.x, en.y, '#ff4444');
                    enemies.splice(ei, 1); pBullets.splice(pbi, 1);
                    coins += 5; document.getElementById('coins').innerText = coins;
                    if(Math.random() > 0.8) dices.push({x: en.x, y: en.y});
                }
            });
            if(pb.y < 0) pBullets.splice(pbi, 1);
        });

        // الوحوش
        enemies.forEach((en, i) => { en.y += en.s; ctx.fillText(en.char, en.x, en.y); if(en.y > canvas.height - 130 && Math.abs(en.x - px) < 50) { explode(px, canvas.height-100, '#fff'); hp -= 20; enemies.splice(i,1); document.getElementById('hp').innerText = hp; if(hp <= 0) { alert("GAME OVER! SCORE: " + score); location.reload(); } } if(en.y > canvas.height) enemies.splice(i,1); });

        // تأثيرات الانفجار
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; ctx.fillStyle = p.c; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 3, 3); if(p.life <= 0) particles.splice(i, 1); });
        ctx.globalAlpha = 1;

        // الأشياء (النرد والماس)
        dices.forEach((d, i) => { d.y += 4; ctx.fillText('🎲', d.x, d.y); if(Math.abs(d.x - px) < 50 && d.y > canvas.height - 150) { hp = Math.min(100, hp+20); document.getElementById('hp').innerText = hp; dices.splice(i,1); } });
        items.forEach((it, i) => { it.y += 4; ctx.fillText('💎', it.x, it.y); if(Math.abs(it.x - px) < 50 && it.y > canvas.height - 150) { coins += 1; document.getElementById('coins').innerText = coins; items.splice(i,1); } });

        requestAnimationFrame(loop);
    }

    setInterval(() => { if(!shopOpen) { let r = Math.random(); if(r > 0.4) enemies.push({x: Math.random()*(canvas.width-50), y: -50, s: 3+Math.random()*4, char: r>0.7?'👽':'🤖'}); else items.push({x: Math.random()*(canvas.width-50), y: -50}); } }, 850);
    loop();
</script>
</body>
</html>

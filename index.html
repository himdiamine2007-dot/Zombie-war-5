<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Survival Online</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; background: #111; }
        
        /* واجهة كتابة الاسم */
        .lobby-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2000;
        }

        #player-name-input {
            padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #ff4444;
            margin-bottom: 20px; text-align: center; width: 260px; background: #222; color: white;
        }

        #start-btn {
            padding: 15px 50px; font-size: 22px; background: #ff4444; 
            color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        /* أزرار التحكم للموبايل */
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 1000; pointer-events: none; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: auto; user-select: none; border: 1px solid rgba(255,255,255,0.3); }
        #fire-btn { background: rgba(255,0,0,0.5); width: 100px; height: 100px; border: 2px solid white; }
    </style>
</head>
<body>

<div id="lobby" class="lobby-overlay">
    <h1 style="color: #ff4444; font-size: 40px; margin-bottom: 10px;">Z-SURVIVAL</h1>
    <p>ادخل اسمك لبدء المعركة</p>
    <input type="text" id="player-name-input" placeholder="اكتب اسمك هنا..." maxlength="12">
    <button id="start-btn">دخول اللعبة</button>
</div>

<div class="controls">
    <div style="display: grid; grid-template-columns: repeat(3, 70px); gap: 10px;">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div></div><div class="btn" id="right">→</div>
        <div></div><div class="btn" id="down">↓</div><div></div>
    </div>
    <div class="btn" id="fire-btn">FIRE</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    document.getElementById('start-btn').onclick = function() {
        const playerName = document.getElementById('player-name-input').value;
        if (playerName.trim() === "") {
            alert("أدخل اسمك أولاً يا بطل!");
            return;
        }
        document.getElementById('lobby').style.display = 'none';
        alert("أهلاً بك يا " + playerName);
    };

    window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
</script>
</body>
</html>

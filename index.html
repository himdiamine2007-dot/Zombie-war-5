       <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Strike: Global Offensive</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: #0b0e11; }

        /* CS:GO Crosshair */
        .crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; pointer-events: none; z-index: 100; }
        .crosshair:before { content: ''; position: absolute; left: 11px; width: 2px; height: 24px; background: #0f0; box-shadow: 0 0 5px #0f0; }
        .crosshair:after { content: ''; position: absolute; top: 11px; width: 24px; height: 2px; background: #0f0; box-shadow: 0 0 5px #0f0; }

        /* HUD - واجهة المعلومات */
        .hud { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; color: #f1c40f; pointer-events: none; z-index: 50; }
        .stat { background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 4px; border-bottom: 4px solid #f1c40f; font-size: 22px; font-weight: bold; font-family: monospace; }

        /* السلاح (M4A1 Style) */
        #weapon-model { position: fixed; bottom: -20px; right: 5%; width: 350px; pointer-events: none; z-index: 40; filter: drop-shadow(0 0 15px #000); }

        /* التحكم */
        .controls { position: fixed; inset: 0; pointer-events: none; z-index: 60; }
        #fire-btn { position: absolute; bottom: 50px; right: 50px; width: 110px; height: 110px; background: rgba(255,255,255,0.05); border: 4px solid #f1c40f; border-radius: 50%; color: #fff; font-weight: bold; font-size: 18px; pointer-events: auto; box-shadow: 0 0 20px rgba(241, 196, 15, 0.2); }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255,255,255,0.03); border-radius: 50%; border: 1px solid #444; pointer-events: auto; }
        #joy-stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: #333; border-radius: 50%; border: 2px solid #555; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div class="crosshair"></div>

<div class="hud">
    <div class="stat">HP: 100</div>
    <div class="stat">💰 $<span id="cash">0</span></div>
</div>

<svg id="weapon-model" viewBox="0 0 200 100">
    <path d="M40,70 L160,70 L170,55 L50,55 Z" fill="#2c3e50" />
    <rect x="140" y="45" width="40" height="12" fill="#1a1a1a" />
    <rect x="55" y="70" width="15" height="40" fill="#1a1a1a" transform="rotate(15 55 70)" />
    <rect x="80" y="70" width="30" height="10" fill="#34495e" />
</svg>

<div class="controls">
    <div id="joy-base"><div id="joy-stick"></div></div>
    <button id="fire-btn">SHOOT</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let cash = 0;
    const enemies = [];
    const bullets = [];

    // تحكم الجويستيك
    let mx = 0, my = 0;
    const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');

    jBase.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const r = jBase.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
        const dist = Math.min(Math.hypot(dx, dy), 50), ang = Math.atan2(dy, dx);
        mx = (Math.cos(ang) * dist) / 50; my = (Math.sin(ang) * dist) / 50;
        jStick.style.left = `calc(50% + ${Math.cos(ang)*dist}px)`;
        jStick.style.top = `calc(50% + ${Math.sin(ang)*dist}px)`;
    });

    jBase.addEventListener('touchend', () => { mx=0; my=0; jStick.style.left='50%'; jStick.style.top='50%'; });

    document.getElementById('fire-btn').ontouchstart = (e) => { e.preventDefault(); shoot(); };

    function shoot() {
        bullets.push({x: canvas.width/2, y: canvas.height/2, vx: (Math.random()-0.5)*10, vy: -15});
        // تأثير ارتداد السلاح
        document.getElementById('weapon-model').style.transform = 'translateY(10px) rotate(-5deg)';
        setTimeout(() => document.getElementById('weapon-model').style.transform = 'translateY(0) rotate(-5deg)', 50);
    }

    function spawn() {
        enemies.push({ x: Math.random()*canvas.width, y: canvas.height/2, z: 0.1, s: 1 });
        setTimeout(spawn, 1200);
    }

    function drawMap() {
        // رسم أرضية 3D
        ctx.fillStyle = '#1b2838'; // سماء غامقة
        ctx.fillRect(0, 0, canvas.width, canvas.height/2);
        
        ctx.fillStyle = '#070707'; // أرضية
        ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

        ctx.strokeStyle = '#1a1a1a';
        for(let i=-canvas.width; i<canvas.width*2; i+=80) {
            ctx.beginPath();
            ctx.moveTo(i + (mx*50), canvas.height);
            ctx.lineTo(canvas.width/2, canvas.height/2);
            ctx.stroke();
        }
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawMap();

        enemies.forEach((e, i) => {
            e.y += e.s + (e.z * 5);
            e.z += 0.01;
            let size = 15 + (e.z * 100);
            
            // رسم الزومبي بـ "ستايل" CSGO (Terrorist colors)
            ctx.fillStyle = '#c0392b';
            ctx.beginPath(); ctx.arc(e.x, e.y, size, 0, 7); ctx.fill();
            
            // نيشنتي عليه؟
            if(Math.hypot(e.x - canvas.width/2, e.y - canvas.height/2) < size + 10) {
                // Damage logic could go here
            }
        });

        requestAnimationFrame(loop);
    }

    spawn(); loop();
</script>
</body>
</html>

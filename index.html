
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alien Survival - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-around; align-items: center; color: #fff; z-index: 100; border-bottom: 2px solid #00d4ff; }
        .val { color: #00d4ff; font-weight: bold; font-size: 18px; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 3px solid #00d4ff; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #fire-btn { background: rgba(0, 212, 255, 0.3); }
        #reload-box { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); width: 60%; height: 10px; background: #222; border: 1px solid #00d4ff; display: none; }
        #reload-fill { width: 0%; height: 100%; background: #00d4ff; }
        #ammo-txt { position: fixed; bottom: 125px; width: 100%; text-align: center; color: #fff; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div>🏆 سكور: <span class="val" id="score">0</span></div>
    <div>💰 كوينز: <span class="val" id="coins">0</span></div>
    <div>❤️: <span class="val" id="hp">100</span>%</div>
</div>

<div id="ammo-txt">الذخيرة: 10/10</div>
<div id="reload-box"><div id="reload-fill"></div></div>

<div class="controls">
    <div style="display:flex; gap:10px;">
        <div class="btn" id="l">⬅️</div>
        <div class="btn" id="r">➡️</div>
    </div>
    <div class="btn" id="fire-btn">🔫</div>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let score = 0, coins = 0, hp = 100, ammo = 10, reloading = false;
    let px = canvas.width/2-30, items = [], enemies = [], ml = false, mr = false;

    setInterval(() => { if(hp > 0) { score++; document.getElementById('score').innerText = score; } }, 1000);

    document.getElementById('l').ontouchstart = (e) => { e.preventDefault(); ml = true; };
    document.getElementById('l').ontouchend = () => ml = false;
    document.getElementById('r').ontouchstart = (e) => { e.preventDefault(); mr = true; };
    document.getElementById('r').ontouchend = () => mr = false;

    document.getElementById('fire-btn').ontouchstart = (e) => {
        e.preventDefault();
        if(ammo > 0 && !reloading) {
            ammo--; updateAmmo();
            // النار تدفع الفضائيين
            enemies.forEach(en => { if(Math.abs(en.x - px) < 120) en.y -= 150; });
            if(ammo === 0) startReload();
        }
    };

    function updateAmmo() { document.getElementById('ammo-txt').innerText = `الذخيرة: ${ammo}/10`; }

    function startReload() {
        reloading = true;
        document.getElementById('reload-box').style.display = 'block';
        let w = 0;
        let inv = setInterval(() => {
            w += 0.16; // 60 ثانية تقريباً
            document.getElementById('reload-fill').style.width = w + '%';
            if(w >= 100) { clearInterval(inv); ammo = 10; reloading = false; document.getElementById('reload-box').style.display = 'none'; updateAmmo(); }
        }, 100);
    }

    function loop() {
        if(hp <= 0) return;
        ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        if(ml && px > 0) px -= 8; if(mr && px < canvas.width - 60) px += 8;
        ctx.font = '50px Arial'; ctx.fillText('🚀', px, canvas.height - 100);

        enemies.forEach((en, i) => {
            en.y += en.s; ctx.fillText(en.char, en.x, en.y);
            if(en.y > canvas.height - 130 && en.y < canvas.height - 70 && Math.abs(en.x - px) < 50) {
                hp -= 20; enemies.splice(i,1);
                document.getElementById('hp').innerText = hp;
                if(hp <= 0) { alert("انتهى الغزو! السكور: " + score); location.reload(); }
            }
            if(en.y > canvas.height) enemies.splice(i, 1);
        });

        items.forEach((it, i) => {
            it.y += 3; ctx.fillText('💎', it.x, it.y);
            if(it.y > canvas.height - 130 && it.y < canvas.height - 70 && Math.abs(it.x - px) < 50) {
                coins += 1; document.getElementById('coins').innerText = coins;
                items.splice(i,1);
            }
            if(it.y > canvas.height) items.splice(i, 1);
        });

        requestAnimationFrame(loop);
    }

    setInterval(() => {
        let r = Math.random();
        if(r > 0.4) enemies.push({x: Math.random()*(canvas.width-50), y: -50, s: 3+Math.random()*3, char: r > 0.7 ? '👽' : '🤖'});
        else items.push({x: Math.random()*(canvas.width-50), y: -50});
    }, 900);

    loop();
</script>
</body>
</html>

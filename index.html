<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Strike: Pure Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0b0e11; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: #0b0e11; }
        
        /* HUD الاحترافي */
        .hud { position: fixed; inset: 0; pointer-events: none; color: #fff; z-index: 10; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; }
        .crosshair:before { content: ''; position: absolute; left: 9px; width: 2px; height: 20px; background: #0f0; }
        .crosshair:after { content: ''; position: absolute; top: 9px; width: 20px; height: 2px; background: #0f0; }

        /* الأزرار */
        .controls { position: fixed; inset: 0; pointer-events: none; }
        .btn { position: absolute; pointer-events: auto; touch-action: none; display: flex; align-items: center; justify-content: center; }
        
        #fire { bottom: 40px; right: 40px; width: 90px; height: 90px; border-radius: 50%; border: 3px solid #f1c40f; background: rgba(241, 196, 15, 0.1); color: #fff; font-weight: bold; }
        #shop-btn { top: 20px; right: 20px; padding: 10px 20px; background: #f1c40f; color: #000; border-radius: 5px; font-weight: bold; border: none; }

        /* الجويستيك النقي */
        .joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .joy-stick { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: #444; border-radius: 50%; border: 2px solid #666; }

        /* شاشة البداية */
        .screen { position: fixed; inset: 0; background: #0b0e11; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #f1c40f; }
    </style>
</head>
<body>

<div id="lobby" class="screen">
    <h1 style="letter-spacing: 8px;">Z-STRIKE</h1>
    <button style="padding: 15px 40px; background: #f1c40f; border: none; font-weight: bold;" onclick="init()">START MISSION</button>
</div>

<div class="hud">
    <div class="crosshair"></div>
    <div style="position: absolute; top: 20px; left: 20px; font-size: 18px;">💰 $<span id="cash">0</span> | ⏳ <span id="timer">02:00</span></div>
    <button id="shop-btn" class="btn" onclick="openShop()">SHOP</button>
</div>

<div class="controls">
    <div class="joy-base" id="jBase"><div class="joy-stick" id="jStick"></div></div>
    <button id="fire" class="btn">FIRE</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let playing = false; let cash = 0; let level = 1; let time = 120;
    const player = { x: canvas.width/2, y: canvas.height/2, r: 15, speed: 4 };
    const enemies = []; const bullets = [];

    // تحكم الجويستيك
    let mx = 0, my = 0;
    const jBase = document.getElementById('jBase');
    const jStick = document.getElementById('jStick');

    jBase.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        const r = jBase.getBoundingClientRect();
        const dx = t.clientX - (r.left + r.width/2);
        const dy = t.clientY - (r.top + r.height/2);
        const d = Math.min(Math.hypot(dx, dy), 40);
        const a = Math.atan2(dy, dx);
        mx = (Math.cos(a) * d) / 40; my = (Math.sin(a) * d) / 40;
        jStick.style.left = `calc(50% + ${Math.cos(a)*d}px)`;
        jStick.style.top = `calc(50% + ${Math.sin(a)*d}px)`;
    });

    jBase.addEventListener('touchend', () => { mx=0; my=0; jStick.style.left='50%'; jStick.style.top='50%'; });
    document.getElementById('fire').ontouchstart = (e) => { e.preventDefault(); bullets.push({x: player.x, y: player.y}); };

    function init() { document.getElementById('lobby').style.display='none'; playing=true; spawn(); tick(); loop(); }

    function tick() {
        if(!playing) return;
        if(time > 0) {
            time--;
            document.getElementById('timer').innerText = `0${Math.floor(time/60)}:${time%60 < 10 ? '0'+time%60 : time%60}`;
            setTimeout(tick, 1000);
        } else { spawnBoss(); }
    }

    function spawnBoss() {
        enemies.push({x: canvas.width/2, y: -50, r: 60, hp: 50*level, type: 'BOSS'});
        time = 120; level = Math.min(level+1, 4);
    }

    function spawn() {
        if(!playing) return;
        enemies.push({x: Math.random()*canvas.width, y: -20, r: 15, hp: 2, s: 1.5 + (level*0.3)});
        setTimeout(spawn, 2000 / level);
    }

    function loop() {
        if(!playing) return;
        ctx.fillStyle = "#0b0e11"; ctx.fillRect(0,0,canvas.width, canvas.height);

        player.x += mx * player.speed; player.y += my * player.speed;

        // Player
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fillStyle = "#4a6a8a"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.stroke();

        bullets.forEach((b, i) => {
            b.y -= 10; ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x-1, b.y, 2, 15);
            if(b.y < 0) bullets.splice(i, 1);
        });

        enemies.forEach((e, i) => {
            e.y += e.s || 2;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
            ctx.fillStyle = e.type === 'BOSS' ? "#9b59b6" : "#e74c3c"; ctx.fill();

            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x-e.x, b.y-e.y) < e.r) {
                    e.hp--; bullets.splice(bi, 1);
                    if(e.hp <= 0) { cash += 50; document.getElementById('cash').innerText = cash; enemies.splice(i,1); }
                }
            });
        });
        requestAnimationFrame(loop);
    }
    function openShop() { alert("Shop coming in next update! Keep killing zombies!"); }
</script>
</body>
</html>
